<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Courbe de cuisson Four Céramique</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #D85A30; --orange-bg: #FAECE7;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --green: #3B6D11; --green-bg: #EAF3DE;
    --red: #A32D2D; --red-bg: #FCEBEB;
    --amber: #BA7517; --amber-bg: #FAEEDA;
    --border: rgba(0,0,0,0.12); --surface: #f5f4f1; --card: #ffffff;
    --text: #1a1a18; --text2: #5F5E5A;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --orange: #F0997B; --orange-bg: #4A1B0C;
      --blue: #85B7EB; --blue-bg: #042C53;
      --green: #97C459; --green-bg: #173404;
      --red: #F09595; --red-bg: #501313;
      --amber: #EF9F27; --amber-bg: #412402;
      --border: rgba(255,255,255,0.12); --surface: #1a1a18; --card: #2a2a28;
      --text: #f0ede8; --text2: #B4B2A9;
    }
  }
  html, body { background: var(--surface); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; min-height: 100vh; }
  body { padding: 0 0 40px 0; }

  /* ── Titre centré ── */
  .top-bar { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 14px 16px 13px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .top-bar h1 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; line-height: 1.3; }

  .section { padding: 0 14px; margin-top: 14px; }

  /* ── 2 métriques côte à côte ── */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .metric-val { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric-unit { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .metric.orange .metric-val { color: var(--orange); }
  .metric.blue .metric-val { color: var(--blue); }

  /* ── Graphique ── */
  .chart-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 10px 10px; }
  .chart-legend { display: flex; gap: 16px; margin-bottom: 10px; padding: 0 4px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }

  /* ── Carte saisie ── */
  .input-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }

  /* ── Grille 2 colonnes chrono | manuel ── */
  .two-cols { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 10px; margin-bottom: 12px; }

  /* colonne générique */
  .col-block { display: flex; flex-direction: column; gap: 8px; }
  .col-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; text-align: center; margin-bottom: 2px; }

  /* séparateur vertical */
  .col-sep { width: 0.5px; background: var(--border); align-self: stretch; }

  /* ── Chrono ── */
  .chrono-display { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; text-align: center; }
  .chrono-display.running { color: var(--orange); }
  .chrono-display.paused { color: var(--amber); }
  .btn-chrono-start { background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; width: 100%; }
  .btn-chrono-start:active { opacity: 0.85; transform: scale(0.98); }
  .btn-chrono-start.running { background: var(--amber); }
  .btn-chrono-reset { background: var(--surface); color: var(--text2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 6px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; width: 100%; }
  .btn-chrono-reset:active { opacity: 0.7; }
  .chrono-btns-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }

  /* ── Champs ── */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); font-weight: 500; text-align: center; }
  .field input { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; font-size: 18px; color: var(--text); width: 100%; font-family: inherit; -webkit-appearance: none; appearance: none; outline: none; text-align: center; font-weight: 600; }
  .field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(216,90,48,0.15); }
  .field input::placeholder { font-size: 13px; font-weight: 400; opacity: 0.4; }

  /* h+min côte à côte */
  .hmin-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

  /* ── Bouton enregistrer pleine largeur ── */
  .btn-capture { width: 100%; background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .btn-capture:active { opacity: 0.85; transform: scale(0.98); }
  .btn-capture:disabled { opacity: 0.32; }

  /* ── Boutons bas ── */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; text-align: center; }
  .btn-secondary:active { opacity: 0.7; }
  .btn-pdf { background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(59,109,17,0.25); }

  /* ── Tableau ── */
  .table-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 26px 1fr 52px 52px 32px; padding: 9px 10px; background: var(--surface); border-bottom: 0.5px solid var(--border); }
  .table-header span { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .table-row { display: grid; grid-template-columns: 26px 1fr 52px 52px 32px; padding: 11px 10px; border-bottom: 0.5px solid var(--border); align-items: center; }
  .table-row:last-child { border-bottom: none; }
  .table-row span { font-size: 14px; color: var(--text); }
  .num { color: var(--text2); font-size: 12px; }
  .spd-up { color: var(--green); font-weight: 600; }
  .spd-dn { color: var(--red); font-weight: 600; }
  .spd-na { color: var(--text2); }
  .src-badge { font-size: 10px; display: inline-block; vertical-align: middle; margin-left: 3px; opacity: 0.7; }
  .btn-del { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 18px; padding: 0; line-height: 1; -webkit-tap-highlight-color: transparent; width: 28px; text-align: center; }
  .btn-del:active { color: var(--red); }
  .no-data { padding: 28px 16px; text-align: center; color: var(--text2); font-size: 14px; }

  .chrono-set-panel { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease; margin-top: 0; }
  .chrono-set-panel.open { max-height: 60px; opacity: 1; margin-top: 8px; }
  .chrono-set-fields { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 8px; }
  .chrono-set-fields input { background: transparent; border: none; outline: none; padding: 4px 2px; font-size: 17px; color: var(--text); font-family: inherit; -webkit-appearance: none; appearance: none; text-align: center; font-weight: 600; width: 100%; }
  .chrono-set-fields input::placeholder { font-size: 12px; font-weight: 400; opacity: 0.4; }
  .set-sep { font-size: 16px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
  .btn-chrono-set { background: var(--blue-bg); color: var(--blue); border: 0.5px solid rgba(24,95,165,0.25); border-radius: var(--radius-sm); padding: 9px 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .btn-chrono-set:active { opacity: 0.75; }
  .btn-set-ok { background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .btn-set-ok:active { opacity: 0.8; }
  .divider { height: 0.5px; background: var(--border); margin: 12px 0 0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; border-radius: 20px; padding: 10px 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.25s; z-index: 100; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Courbe de cuisson Four Céramique 🔥</h1>
</div>

<!-- 2 métriques : température + vitesse -->
<div class="section">
  <div class="metrics">
    <div class="metric orange">
      <div class="metric-label">Température</div>
      <div class="metric-val" id="m-temp">—</div>
      <div class="metric-unit">°C dernier relevé</div>
    </div>
    <div class="metric blue">
      <div class="metric-label">Vitesse</div>
      <div class="metric-val" id="m-speed">—</div>
      <div class="metric-unit">°C/h</div>
    </div>
  </div>
</div>

<!-- Graphique -->
<div class="section">
  <div class="chart-card">
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Température (°C)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#185FA5;opacity:0.7"></div>Vitesse (°C/h)</div>
    </div>
    <div class="chart-wrap">
      <canvas id="myChart" role="img" aria-label="Courbe de cuisson four céramique"></canvas>
    </div>
  </div>
</div>

<!-- Saisie : 2 colonnes côte à côte -->
<div class="section">
  <div class="input-card">

    <div class="two-cols">

      <!-- Colonne gauche : chronomètre -->
      <div class="col-block">
        <div class="col-title">Chronomètre</div>
        <div class="chrono-display" id="chrono-disp">0:00:00</div>
        <div class="chrono-btns-row">
          <button class="btn-chrono-start" id="btn-start" onclick="toggleChrono()">Démarrer</button>
          <button class="btn-chrono-set" id="btn-definir" onclick="toggleDefinirPanel()">Définir</button>
          <button class="btn-chrono-reset" onclick="resetChrono()">Réinit.</button>
        </div>
        <div class="chrono-set-panel" id="set-panel">
          <div class="chrono-set-fields">
            <input type="number" id="set-h" inputmode="numeric" placeholder="h" min="0" max="24" autocomplete="off" />
            <span class="set-sep">:</span>
            <input type="number" id="set-m" inputmode="numeric" placeholder="mm" min="0" max="59" autocomplete="off" />
            <button class="btn-set-ok" onclick="setChronoTime()">OK</button>
          </div>
        </div>
        <div class="field">
          <label for="chrono-temp">Température °C</label>
          <input type="number" id="chrono-temp" inputmode="numeric" placeholder="ex : 850" min="0" max="1400" autocomplete="off" />
        </div>
      </div>

      <!-- Séparateur -->
      <div class="col-sep"></div>

      <!-- Colonne droite : saisie manuelle -->
      <div class="col-block">
        <div class="col-title">Saisie manuelle</div>
        <div class="field">
          <label>Temps</label>
          <div class="hmin-row">
            <div class="field">
              <label for="inp-h">h</label>
              <input type="number" id="inp-h" inputmode="numeric" placeholder="0" min="0" max="24" autocomplete="off" />
            </div>
            <div class="field">
              <label for="inp-m">min</label>
              <input type="number" id="inp-m" inputmode="numeric" placeholder="00" min="0" max="59" autocomplete="off" />
            </div>
          </div>
        </div>
        <div class="field">
          <label for="inp-temp">Température °C</label>
          <input type="number" id="inp-temp" inputmode="numeric" placeholder="ex : 450" min="0" max="1400" autocomplete="off" />
        </div>
      </div>

    </div>

    <!-- Bouton pleine largeur -->
    <button class="btn-capture" id="btn-capture" onclick="enregistrer()" disabled>Enregistrer le relevé</button>

    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn-secondary btn-pdf" onclick="exportPDF()">Exporter PDF</button>
      <button class="btn-secondary" onclick="clearAll()">Tout effacer</button>
    </div>

  </div>
</div>

<!-- Tableau des relevés -->
<div class="section" style="margin-top:14px">
  <div class="table-card" id="table-wrap">
    <div class="no-data">Aucun relevé pour l'instant</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const STORAGE_KEY = 'ceramique_v3';
let points = [];
let chart = null;
let tooltipHideTimer = null;
let chronoRunning = false;
let chronoStartMs = null;
let chronoAccumMs = 0;
let rafId = null;

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    points = d.points || [];
    chronoAccumMs = d.accumMs || 0;
    if (d.running && d.startMs) { chronoStartMs = d.startMs; chronoRunning = true; }
  } catch(e) {}
}

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ points, running: chronoRunning, startMs: chronoStartMs, accumMs: chronoAccumMs }));
  } catch(e) {}
}

function elapsedMs() { return chronoRunning ? chronoAccumMs + (Date.now() - chronoStartMs) : chronoAccumMs; }
function elapsedH() { return elapsedMs() / 3600000; }

function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  return h + ':' + String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
}

function formatTime(h) {
  const hr = Math.floor(h);
  const mn = Math.round((h - hr) * 60);
  return hr + 'h' + String(mn).padStart(2,'0');
}

function calcSpeed(i) {
  if (i === 0 || i >= points.length) return null;
  const dt = points[i].time - points[i-1].time;
  return dt <= 0 ? null : (points[i].temp - points[i-1].temp) / dt;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── Chrono ── */
function toggleChrono() {
  if (chronoRunning) {
    chronoAccumMs += Date.now() - chronoStartMs;
    chronoStartMs = null;
    chronoRunning = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    document.getElementById('btn-start').textContent = 'Reprendre';
    document.getElementById('btn-start').classList.remove('running');
    document.getElementById('chrono-disp').className = 'chrono-display paused';
  } else {
    chronoStartMs = Date.now();
    chronoRunning = true;
    document.getElementById('btn-start').textContent = 'Pause';
    document.getElementById('btn-start').classList.add('running');
    document.getElementById('chrono-disp').className = 'chrono-display running';
    tick();
  }
  updateBtn();
  saveStorage();
}

function tick() {
  if (!chronoRunning) return;
  document.getElementById('chrono-disp').textContent = fmtMs(elapsedMs());
  rafId = requestAnimationFrame(tick);
}

function resetChrono() {
  if ((chronoRunning || chronoAccumMs > 0) && !confirm('Réinitialiser le chronomètre ? Les relevés ne seront pas effacés.')) return;
  chronoRunning = false; chronoStartMs = null; chronoAccumMs = 0;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.getElementById('chrono-disp').textContent = '0:00:00';
  document.getElementById('chrono-disp').className = 'chrono-display';
  document.getElementById('btn-start').textContent = 'Démarrer';
  document.getElementById('btn-start').classList.remove('running');
  updateBtn();
  saveStorage();
  toast('Chronomètre réinitialisé');
}

function toggleDefinirPanel() {
  const panel = document.getElementById('set-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    setTimeout(() => document.getElementById('set-h').focus(), 50);
  }
}

function setChronoTime() {
  const h = parseFloat(document.getElementById('set-h').value) || 0;
  const m = parseFloat(document.getElementById('set-m').value) || 0;
  if (m < 0 || m > 59) { toast('Les minutes doivent être entre 0 et 59'); return; }
  const ms = (h * 3600 + m * 60) * 1000;
  if (ms < 0) { toast('Valeur invalide'); return; }
  if (chronoRunning) {
    chronoAccumMs += Date.now() - chronoStartMs;
    chronoStartMs = null;
    chronoRunning = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    document.getElementById('btn-start').textContent = 'Démarrer';
    document.getElementById('btn-start').classList.remove('running');
    document.getElementById('chrono-disp').className = 'chrono-display';
  }
  chronoAccumMs = ms;
  document.getElementById('chrono-disp').textContent = fmtMs(ms);
  document.getElementById('chrono-disp').className = 'chrono-display paused';
  document.getElementById('set-h').value = '';
  document.getElementById('set-m').value = '';
  updateBtn();
  saveStorage();
  document.getElementById('set-panel').classList.remove('open');
  toast('Chrono réglé sur ' + formatTime(ms / 3600000));
}

/* ── Activation bouton Enregistrer ── */
function updateBtn() {
  const chronoHasTemp = document.getElementById('chrono-temp').value !== '';
  const chronoReady = chronoHasTemp && elapsedMs() >= 100;
  const h = document.getElementById('inp-h').value;
  const m = document.getElementById('inp-m').value;
  const t = document.getElementById('inp-temp').value;
  const manualReady = (h !== '' || m !== '') && t !== '';
  document.getElementById('btn-capture').disabled = !(chronoReady || manualReady);
}

/* ── Enregistrer : détermine la source active ── */
function enregistrer() {
  const chronoTemp = document.getElementById('chrono-temp').value;
  const manH = document.getElementById('inp-h').value;
  const manM = document.getElementById('inp-m').value;
  const manTemp = document.getElementById('inp-temp').value;

  const chronoReady = chronoTemp !== '' && elapsedMs() >= 100;
  const manualReady = (manH !== '' || manM !== '') && manTemp !== '';

  if (chronoReady) {
    captureFromChrono();
  } else if (manualReady) {
    captureManual();
  } else {
    toast('Remplissez les champs d\'une des deux colonnes');
  }
}

function captureFromChrono() {
  const temp = parseFloat(document.getElementById('chrono-temp').value);
  if (isNaN(temp) || temp < 0 || temp > 1400) { toast('Température invalide (0–1400 °C)'); return; }
  const t = elapsedH();
  if (t < 0.0001) { toast('Démarrez le chronomètre d\'abord'); return; }
  if (points.find(p => Math.abs(p.time - t) < 0.001)) { toast('Relevé trop proche du précédent'); return; }
  points.push({ time: t, temp, src: 'chrono' });
  points.sort((a, b) => a.time - b.time);
  saveStorage();
  document.getElementById('chrono-temp').value = '';
  updateBtn();
  render();
  toast('Relevé chrono — ' + formatTime(t) + ' → ' + Math.round(temp) + ' °C');
}

function captureManual() {
  const h = parseFloat(document.getElementById('inp-h').value) || 0;
  const m = parseFloat(document.getElementById('inp-m').value) || 0;
  const temp = parseFloat(document.getElementById('inp-temp').value);
  if (isNaN(temp) || temp < 0 || temp > 1400) { toast('Température invalide (0–1400 °C)'); return; }
  if (m < 0 || m > 59) { toast('Les minutes doivent être entre 0 et 59'); return; }
  const t = h + m / 60;
  if (t < 0) { toast('Temps invalide'); return; }
  if (points.find(p => Math.abs(p.time - t) < 0.001)) { toast('Un relevé existe déjà à ce temps'); return; }
  points.push({ time: t, temp, src: 'manual' });
  points.sort((a, b) => a.time - b.time);
  saveStorage();
  document.getElementById('inp-h').value = '';
  document.getElementById('inp-m').value = '';
  document.getElementById('inp-temp').value = '';
  updateBtn();
  render();
  toast('Relevé manuel — ' + formatTime(t) + ' → ' + Math.round(temp) + ' °C');
}

function deletePoint(i) {
  if (!confirm('Supprimer ce relevé ?')) return;
  points.splice(i, 1);
  saveStorage(); render(); toast('Relevé supprimé');
}

function clearAll() {
  if (!points.length) return;
  if (!confirm('Effacer tous les relevés ?')) return;
  points = []; saveStorage(); render(); toast('Données effacées');
}

/* ── Rendu ── */
function render() { renderMetrics(); renderChart(); renderTable(); }

function renderMetrics() {
  const n = points.length;
  if (!n) {
    document.getElementById('m-temp').textContent = '—';
    document.getElementById('m-speed').textContent = '—';
    return;
  }
  const last = points[n-1];
  document.getElementById('m-temp').textContent = Math.round(last.temp);
  const spd = calcSpeed(n-1);
  document.getElementById('m-speed').textContent = spd !== null ? Math.round(spd) : '—';
}

function gc() {
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  return { grid: dark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)', tick: dark ? '#B4B2A9' : '#888780', orangeFill: dark ? 'rgba(216,90,48,0.18)' : 'rgba(216,90,48,0.10)' };
}

Chart.register({
  id: 'autoHideTooltip',
  afterEvent(ch, args) {
    const evt = args.event;
    if (evt.type === 'click' || evt.type === 'touchstart') {
      clearTimeout(tooltipHideTimer);
      tooltipHideTimer = setTimeout(() => {
        ch.tooltip.setActiveElements([], { x: 0, y: 0 });
        ch.update('none');
      }, 4000);
    }
  }
});

function renderChart() {
  const labels = points.map(p => formatTime(p.time));
  const temps  = points.map(p => p.temp);
  const speeds = points.map((p,i) => { const s = calcSpeed(i); return s !== null ? +s.toFixed(1) : null; });
  const c = gc();
  if (!chart) {
    chart = new Chart(document.getElementById('myChart').getContext('2d'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'T°C', data: temps, borderColor: '#D85A30', backgroundColor: c.orangeFill, fill: true, tension: 0.35, pointRadius: 2, pointHitRadius: 20, pointBackgroundColor: '#D85A30', borderWidth: 2.5, yAxisID: 'yT' },
        { label: 'Vit', data: speeds, borderColor: '#185FA5', backgroundColor: 'transparent', fill: false, tension: 0.35, pointRadius: 2, pointHitRadius: 20, pointBackgroundColor: '#185FA5', borderWidth: 1.5, borderDash: [6,3], spanGaps: true, yAxisID: 'yS' }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: 'rgba(26,26,24,0.92)', titleColor: '#fff', bodyColor: '#D3D1C7', padding: 10, cornerRadius: 8, callbacks: { label: ctx => ctx.datasetIndex === 0 ? '  Temp : ' + Math.round(ctx.parsed.y) + ' °C' : (ctx.parsed.y !== null ? '  Vitesse : ' + Math.round(ctx.parsed.y) + ' °C/h' : null) } },
          autoHideTooltip: {}
        },
        scales: {
          x: { ticks: { color: c.tick, font: { size: 11 }, autoSkip: true, maxTicksLimit: 7, maxRotation: 35 }, grid: { color: c.grid } },
          yT: { type: 'linear', position: 'left', min: 0, max: 1400, ticks: { color: '#D85A30', font: { size: 11 }, stepSize: 200 }, grid: { color: c.grid } },
          yS: { type: 'linear', position: 'right', ticks: { color: '#185FA5', font: { size: 11 } }, grid: { drawOnChartArea: false } }
        }
      }
    });
  } else {
    chart.data.labels = labels;
    chart.data.datasets[0].data = temps;
    chart.data.datasets[1].data = speeds;
    chart.update();
  }
}

function renderTable() {
  const wrap = document.getElementById('table-wrap');
  if (!points.length) { wrap.innerHTML = '<div class="no-data">Aucun relevé pour l\'instant</div>'; return; }
  let html = '<div class="table-header"><span>#</span><span>Temps</span><span>T °C</span><span>Vit.</span><span></span></div>';
  [...points].reverse().forEach((p, ri) => {
    const i = points.length - 1 - ri;
    const spd = calcSpeed(i);
    let sh = '<span class="spd-na">—</span>';
    if (spd !== null) {
      const sr = Math.round(spd);
      sh = spd > 0 ? `<span class="spd-up">+${sr}</span>` : spd < 0 ? `<span class="spd-dn">${sr}</span>` : `<span class="spd-na">0</span>`;
    }
    const badge = p.src === 'chrono' ? '<span class="src-badge">⏱</span>' : '<span class="src-badge">✏</span>';
    html += `<div class="table-row"><span class="num">${i+1}</span><span>${formatTime(p.time)}${badge}</span><span>${Math.round(p.temp)}</span><span>${sh}</span><button class="btn-del" onclick="deletePoint(${i})">×</button></div>`;
  });
  wrap.innerHTML = html;
}

function exportPDF() {
  if (!points.length) { toast('Aucun relevé à exporter'); return; }
  toast('Génération du PDF…');
  setTimeout(() => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const W = 297, H = 210;
      const now = new Date();
      const ds = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      doc.setFillColor(245,244,241); doc.rect(0,0,W,H,'F');
      doc.setFillColor(216,90,48); doc.rect(0,0,6,H,'F');
      doc.setFontSize(20); doc.setFont(undefined,'bold'); doc.setTextColor(30,30,28);
      doc.text('Courbe de cuisson Four Céramique', 16, 16);
      doc.setFontSize(10); doc.setFont(undefined,'normal'); doc.setTextColor(95,94,90);
      doc.text('Exporté le ' + ds, 16, 23);
      const last = points[points.length-1]; const sl = calcSpeed(points.length-1);
      doc.setTextColor(30,30,28);
      doc.text(`${points.length} relevés  |  Durée : ${formatTime(last.time)}  |  Temp. finale : ${Math.round(last.temp)} °C  |  Vitesse finale : ${sl !== null ? Math.round(sl) + ' °C/h' : '—'}`, 16, 31);
      doc.setDrawColor(216,90,48); doc.setLineWidth(0.4); doc.line(16,34,W-16,34);
      const gridColorBefore = chart.options.scales.x.grid.color;
      chart.options.scales.x.grid.color = 'rgba(0,0,0,0.75)';
      chart.options.scales.yT.grid.color = 'rgba(0,0,0,0.75)';
      chart.update('none');
      doc.addImage(document.getElementById('myChart').toDataURL('image/png',0.95), 'PNG', 16, 38, 170, 100);
      chart.options.scales.x.grid.color = gridColorBefore;
      chart.options.scales.yT.grid.color = gridColorBefore;
      chart.update('none');
      const lx = 196, ly = 38;
      doc.setFillColor(216,90,48); doc.rect(lx,ly+1,6,3,'F'); doc.setFontSize(9); doc.setTextColor(50,50,48); doc.text('Température (°C)', lx+9, ly+4);
      doc.setFillColor(24,95,165); doc.rect(lx,ly+8,6,3,'F'); doc.text('Vitesse (°C/h)', lx+9, ly+11);
      const cols = [lx, lx+12, lx+33, lx+55, lx+72];
      let ry = ly+22;
      doc.setFontSize(8.5); doc.setTextColor(95,94,90);
      ['#','Temps','T° (°C)','Vit.','Source'].forEach((h,i) => doc.text(h, cols[i], ry));
      ry+=2; doc.setDrawColor(180,178,169); doc.setLineWidth(0.3); doc.line(lx,ry,lx+90,ry); ry+=5;
      points.forEach((p,idx) => {
        const spd = calcSpeed(idx);
        const ss = spd !== null ? (spd>0?'+':'') + Math.round(spd) : '—';
        doc.setTextColor(30,30,28); doc.text(String(idx+1), cols[0], ry); doc.text(formatTime(p.time), cols[1], ry); doc.text(String(Math.round(p.temp)), cols[2], ry);
        if (spd!==null&&spd>0) doc.setTextColor(59,109,17); else if (spd!==null&&spd<0) doc.setTextColor(163,45,45); else doc.setTextColor(95,94,90);
        doc.text(ss, cols[3], ry);
        doc.setTextColor(24,95,165); doc.text(p.src==='chrono'?'chrono':'manuel', cols[4], ry);
        ry+=6; if (ry>H-12) { doc.addPage(); ry=20; }
      });
      doc.setFontSize(8); doc.setTextColor(160,158,154); doc.text('Courbe de cuisson Four Céramique', 16, H-8);
      doc.save('cuisson-' + now.toISOString().slice(0,10) + '.pdf');
      toast('PDF exporté !');
    } catch(e) { toast('Erreur : ' + e.message); }
  }, 100);
}

/* ── Listeners ── */
['chrono-temp','inp-h','inp-m','inp-temp'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateBtn);
});
document.getElementById('chrono-temp').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); enregistrer(); } });
document.getElementById('inp-temp').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); enregistrer(); } });
document.getElementById('inp-h').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); document.getElementById('inp-m').focus(); } });
document.getElementById('inp-m').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); document.getElementById('inp-temp').focus(); } });

/* ── Init ── */
loadStorage();

if (chronoRunning) {
  document.getElementById('btn-start').textContent = 'Pause';
  document.getElementById('btn-start').classList.add('running');
  document.getElementById('chrono-disp').className = 'chrono-display running';
  tick();
} else if (chronoAccumMs > 0) {
  document.getElementById('chrono-disp').textContent = fmtMs(chronoAccumMs);
  document.getElementById('chrono-disp').className = 'chrono-display paused';
  document.getElementById('btn-start').textContent = 'Reprendre';
}

render();
</script>
</body>
</html>
